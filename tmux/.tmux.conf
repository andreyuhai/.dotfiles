# Bind <C-a> as prefix
set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix

set-window-option -g mode-keys vi

set-option -g detach-on-destroy off

# Source conf file
bind-key r source-file ~/.tmux.conf

# Splits open in current pane's directory (default opens in $HOME)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim key bindings to switch panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Selecting windows
bind -r 0 select-window -t 0
bind -r 1 select-window -t 1
bind -r 2 select-window -t 2
bind -r 3 select-window -t 3
bind -r 4 select-window -t 4
bind -r 5 select-window -t 5
bind -r 6 select-window -t 6
bind -r 7 select-window -t 7
bind -r 8 select-window -t 8
bind -r 9 select-window -t 9

bind -r C-a last-window

# Resize
bind -r - resize-pane -D 5
bind -r + resize-pane -U 5
bind -r > resize-pane -R 5
bind -r < resize-pane -L 5

# Vim-like session arrangement
  # Move window down (increment index)
  # Conflicts with vim motions
# bind -n C-j run "tmux move-window -t +1"

  # Move window up (decrement index)
  # Conflicts with vim motions
# bind -n C-k run 'tmux move-window -t -1'

# Popups
bind b display-popup -w 80% -h 60% -T "Beads Tasks" -E "perles"
bind C display-popup -w 80% -h 70% -T "Claude Dashboard" -E "tmux-claude-dashboard"

# Project sessionizer (fzf over ~/git and ~/work, creates/attaches named session)
bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"

# Just some disposable windows
bind e run-shell "tmux new-window -n iex iex"
bind i run-shell "tmux new-window -t 9 irssi"

set-option -g history-limit 200000

# For vim
set-option -sg escape-time 100
set-option -g focus-events on

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#latest'

# Needs to go after catpuccin
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'andreyuhai/tmux-vim-picker'

# Catppuccin v2 config
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"

# Load catppuccin before composing status line (v2 requirement)
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Status bar layout (v2 uses inline module expansion)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"

# KITTY Protocol
set -s extended-keys on
set -as terminal-features 'tmux-256color:extkeys'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
